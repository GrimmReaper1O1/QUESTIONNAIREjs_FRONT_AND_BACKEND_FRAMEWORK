<!DOCTYPE HTML>

<head>
    <link rel="stylesheet" type="text/css" href="./CSS/stylesheet.css" />
</head>

<body>
    <header class="">
        <div id="menu" class="menu-size height-auto fixed-right"></div>
    </header>
    
    <div class="flex flex-direction-column align-centered vh18">
        <div class="flex flex-direction-row justify-content-centered">
            <div class="seethroughBlack width-rem border-radius">
                <h1>PATHWAYS</h1>
            </div>
        </div>
    </div>
    
    <div id="initial" class="width-80 margin-auto vh80">
        <div class="hidden align-centered" id="backDiv">
            <button class="genreButton" onclick="showSearch(event)">SHOW SEARCH FIELD</button>
            |<button class="genreButton" onclick="removeMods(event)">DELETE</button>
        </div>
        
        <div id="trainingModuleSelection" class="width-100 align-centered flex flex-direction-column justify-content">
            <div>
                <button class="genreButton" onclick="createMod(event)">CREATE</button><br>                
                <input onclick="checkBoxes('title')" type="checkbox" id="title"/>Title &nbsp;<input onclick="checkBoxes('keywords')" type="checkbox" id="keywords" />Keywords &nbsp;<input onclick="checkBoxes('author')" type="checkbox" id="author"/>Author<br><br>
                <input type="text" id="searchField"/>
                <button  onclick="searchUsersDatabase(event)" class="searchButton">SEARCH!</button><br><br>
            </div>
       </div>
       <div id="searchDiv" class="hidden width-100 flex flex-direction-row vh50">
            <div class="min-width-100 vh50">
                <div id="startMenu" class="vh50 overflowScroll">
                    <br>
                </div>
            </div>
            
        </div>
        <div id="paginationControls" class="hidden align-centered"></div>
    </div>

    <script src="./SCRIPT/indexedDb.js"></script>
    <!-- <script src="./SCRIPT/functions.js"></script> -->
    <script src="./SCRIPT/jquery-3.7.1.min.js"></script>
    <script src="./SCRIPT/menu.js"></script>
    <script src="./SCRIPT/uMS.js"></script>
</body>

</HTML>
